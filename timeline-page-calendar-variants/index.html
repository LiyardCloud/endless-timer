<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Page Calendar Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#070912] p-4 text-white sm:p-8" style="font-family: Avenir Next, Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif;">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-semibold">Timeline Page Calendar - 4 Variants</h1>
    <p class="mb-8 max-w-3xl text-sm text-white/55">Full Timeline page explorations. The calendar is inverted: top is current time or end of day, bottom is start of day. Activity bodies are translucent, with a saturated color line at the action start edge.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const entries = [
      { id: 1, action: 'Sleep', icon: 'Moon', color: '#818cf8', start: '00:00', end: '07:20', startMin: 0, durationMin: 440, title: 'Offline / sleep', active: false },
      { id: 2, action: 'Morning', icon: 'Sun', color: '#fbbf24', start: '07:20', end: '08:10', startMin: 440, durationMin: 50, title: 'Coffee, planning, messages', active: false },
      { id: 3, action: 'Deep Work', icon: 'Focus', color: '#6ee7b7', start: '08:10', end: '10:45', startMin: 490, durationMin: 155, title: 'Proposal outline and architecture cleanup', active: false },
      { id: 4, action: 'Break', icon: 'Pause', color: '#fb7185', start: '10:45', end: '11:05', startMin: 645, durationMin: 20, title: 'Coffee and short walk', active: false },
      { id: 5, action: 'Planning', icon: 'Plan', color: '#93c5fd', start: '11:05', end: '12:20', startMin: 665, durationMin: 75, title: 'Timeline calendar redesign notes', active: false },
      { id: 6, action: 'Admin', icon: 'Inbox', color: '#f0abfc', start: '13:10', end: '14:00', startMin: 790, durationMin: 50, title: 'Invoices and messages', active: false },
      { id: 7, action: 'Deep Work', icon: 'Focus', color: '#6ee7b7', start: '14:00', end: 'Now', startMin: 840, durationMin: 110, title: 'Implementation pass', active: true }
    ];

    const topMin = 950;
    const dayHeight = 620;
    const hourMarks = [0, 120, 240, 360, 480, 600, 720, 840, 950];

    function minutesToLabel(min) {
      if (min === topMin) return 'Now 15:50';
      const hours = Math.floor(min / 60).toString().padStart(2, '0');
      const minutes = (min % 60).toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function yFromMinute(min) {
      return dayHeight - (min / topMin) * dayHeight;
    }

    function blockStyle(entry, minHeight = 22) {
      return {
        bottom: `${entry.startMin / topMin * dayHeight}px`,
        height: `${Math.max(entry.durationMin / topMin * dayHeight, minHeight)}px`,
        '--activity': entry.color,
        '--activity-soft': `${entry.color}24`,
        '--activity-border': `${entry.color}66`
      };
    }

    function CalendarButton() {
      return (
        <button className="flex h-9 min-w-0 items-center gap-2 rounded-full border border-white/[0.08] bg-black/20 px-3 text-left text-sm text-white hover:bg-black/30">
          <svg className="size-3.5 shrink-0 text-white/75" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" /></svg>
          <span className="truncate">May 23, 2026</span>
        </button>
      );
    }

    function ArrowControls() {
      return (
        <div className="flex items-center gap-1.5 rounded-full border border-white/[0.07] bg-black/18 p-1">
          {['M18 15l-6-6-6 6', 'M6 9l6 6 6-6'].map((path, index) => (
            <button key={path} className="grid size-8 place-items-center rounded-full border border-white/[0.055] bg-black/20 text-white/80 hover:bg-black/30" aria-label={index ? 'Next day' : 'Previous day'}>
              <svg className="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d={path} /></svg>
            </button>
          ))}
        </div>
      );
    }

    function PageHeader({ meta = '6h 50m tracked' }) {
      return (
        <div className="rounded-[22px] bg-[repeating-linear-gradient(135deg,rgba(255,255,255,0.045)_0px,rgba(255,255,255,0.045)_1px,transparent_1px,transparent_9px),linear-gradient(135deg,rgba(38,92,255,0.26),rgba(7,9,16,0.9))] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-white/[0.06] px-3.5 py-3 shadow-[0_18px_48px_rgba(0,0,0,0.32)] backdrop-blur-xl">
            <div className="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-center">
              <div className="min-w-0">
                <h2 className="text-lg font-semibold leading-tight text-white">Saturday, May 23</h2>
                <p className="mt-1 text-xs text-white/55">{meta}</p>
              </div>
              <div className="flex min-w-0 items-center gap-2">
                <CalendarButton />
                <ArrowControls />
              </div>
            </div>
          </section>
        </div>
      );
    }

    function EditDelete() {
      return (
        <div className="flex items-center gap-1">
          {[
            'M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z',
            'M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6'
          ].map((path, index) => (
            <button key={path} className="grid size-7 place-items-center rounded-full text-white/45 hover:bg-white/10 hover:text-white" aria-label={index ? 'Delete entry' : 'Edit entry'}>
              <svg className="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.1" strokeLinecap="round" strokeLinejoin="round">
                {path.split('M').filter(Boolean).map((part) => <path key={part} d={`M${part}`} />)}
              </svg>
            </button>
          ))}
        </div>
      );
    }

    function TimeRail({ className = 'text-white/35' }) {
      return (
        <div className="relative" style={{ height: dayHeight }}>
          {hourMarks.map((mark) => (
            <div key={mark} className={`absolute right-0 text-[10px] font-medium ${className}`} style={{ top: yFromMinute(mark) - 7 }}>
              {minutesToLabel(mark)}
            </div>
          ))}
        </div>
      );
    }

    function GridLines({ strong = false }) {
      return (
        <>
          {hourMarks.map((mark) => (
            <div key={mark} className={`absolute left-0 right-0 border-t ${strong ? 'border-white/[0.10]' : 'border-white/[0.07]'}`} style={{ top: yFromMinute(mark) }} />
          ))}
        </>
      );
    }

    function Variant1() {
      return (
        <main className="space-y-4">
          <PageHeader />
          <section className="rounded-[22px] border border-white/8 bg-white/[0.035] p-4">
            <div className="mb-4 flex items-center justify-between">
              <div>
                <h3 className="text-base font-semibold">Timer entries</h3>
                <p className="text-xs text-white/45">Current time at top, start of day at bottom</p>
              </div>
              <span className="rounded-full border border-white/8 bg-white/[0.04] px-2.5 py-1 text-[11px] uppercase tracking-[0.16em] text-white/55">Now</span>
            </div>
            <div className="grid grid-cols-[56px_1fr] gap-3">
              <TimeRail />
              <div className="relative overflow-hidden rounded-[12px] border border-white/[0.08] bg-black/20" style={{ height: dayHeight }}>
                <GridLines />
                {entries.map((entry) => (
                  <article key={entry.id} className="absolute left-2 right-2 rounded-md border border-[var(--activity-border)] bg-[var(--activity-soft)] px-3 py-2 shadow-sm transition hover:z-10 hover:bg-[color-mix(in_srgb,var(--activity)_18%,transparent)]" style={blockStyle(entry)}>
                    <div className="absolute inset-x-0 bottom-0 h-1 bg-[var(--activity)]" />
                    <div className="flex min-h-0 justify-between gap-3">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="size-2 rounded-full bg-[var(--activity)]" />
                          <strong className="truncate text-xs font-semibold text-white">{entry.action}</strong>
                          {entry.active && <span className="rounded-full bg-white/10 px-1.5 py-0.5 text-[9px] font-bold uppercase text-white/80">Active</span>}
                        </div>
                        {entry.durationMin > 28 && <p className="mt-1 truncate text-[11px] text-white/52">{entry.title}</p>}
                      </div>
                      <div className="shrink-0 text-right text-[10px] text-white/45">{entry.start}</div>
                    </div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        </main>
      );
    }

    function Variant2() {
      return (
        <main className="space-y-4">
          <PageHeader meta="Dense calendar blocks" />
          <section className="rounded-[22px] border border-white/8 bg-[#080b12]/92 p-4">
            <div className="grid grid-cols-[52px_1fr] gap-3">
              <TimeRail className="font-mono text-white/32" />
              <div className="relative overflow-hidden rounded-[8px] border border-white/[0.10] bg-[linear-gradient(to_bottom,rgba(255,255,255,0.07)_1px,transparent_1px)] bg-[length:100%_39px]" style={{ height: dayHeight }}>
                <div className="absolute inset-x-0 top-0 h-8 bg-gradient-to-b from-white/[0.06] to-transparent" />
                {entries.map((entry) => (
                  <article key={entry.id} className="absolute left-1.5 right-1.5 overflow-hidden rounded-[6px] border border-[var(--activity-border)] bg-[var(--activity-soft)] transition hover:z-10 hover:ring-2 hover:ring-white/12" style={blockStyle(entry, 20)}>
                    <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                    <div className="flex h-full min-h-0 items-center gap-2 px-2 py-1.5">
                      <div className="h-full w-1 shrink-0 rounded-sm bg-[var(--activity)] opacity-80" />
                      <div className="min-w-0 flex-1">
                        <div className="flex items-center gap-2">
                          <span className="truncate text-xs font-semibold text-white">{entry.action}</span>
                          <span className="text-[10px] text-white/38">{entry.start}</span>
                        </div>
                        {entry.durationMin > 34 && <p className="truncate text-[11px] text-white/48">{entry.title}</p>}
                      </div>
                      <EditDelete />
                    </div>
                  </article>
                ))}
              </div>
            </div>
          </section>
        </main>
      );
    }

    function Variant3() {
      return (
        <main className="space-y-4">
          <PageHeader meta="Glass agenda canvas" />
          <section className="rounded-[22px] bg-[repeating-linear-gradient(135deg,rgba(255,255,255,0.045)_0px,rgba(255,255,255,0.045)_1px,transparent_1px,transparent_9px),linear-gradient(135deg,rgba(38,92,255,0.20),rgba(7,9,16,0.9))] p-px">
            <div className="rounded-[21px] border border-white/[0.08] bg-white/[0.06] p-4 backdrop-blur-xl">
              <div className="grid grid-cols-[58px_1fr] gap-3">
                <TimeRail />
                <div className="relative overflow-hidden rounded-[14px] border border-white/[0.08] bg-black/18 shadow-[inset_0_1px_0_rgba(255,255,255,0.05)]" style={{ height: dayHeight }}>
                  <GridLines />
                  <div className="absolute bottom-0 top-0 left-1/2 w-px bg-white/[0.035]" />
                  {entries.map((entry) => (
                    <article key={entry.id} className="absolute left-2 right-2 rounded-[7px] border border-white/[0.08] bg-[var(--activity-soft)] px-3 py-2 backdrop-blur transition hover:z-10 hover:bg-[color-mix(in_srgb,var(--activity)_20%,transparent)]" style={blockStyle(entry, 24)}>
                      <div className="absolute inset-x-0 bottom-0 h-1 bg-[var(--activity)] shadow-[0_-8px_18px_var(--activity)] opacity-90" />
                      <div className="flex min-h-0 items-start justify-between gap-3">
                        <div className="min-w-0">
                          <strong className="truncate text-xs font-semibold text-white">{entry.action}</strong>
                          {entry.durationMin > 36 && <p className="mt-1 truncate text-[11px] text-white/55">{entry.title}</p>}
                        </div>
                        <span className="shrink-0 rounded-full bg-black/18 px-2 py-0.5 text-[10px] text-white/45">{entry.start}</span>
                      </div>
                    </article>
                  ))}
                </div>
              </div>
            </div>
          </section>
        </main>
      );
    }

    function Variant4() {
      return (
        <main className="space-y-4">
          <PageHeader meta="Split by action lanes" />
          <section className="rounded-[22px] border border-white/8 bg-white/[0.035] p-4">
            <div className="mb-3 grid grid-cols-[58px_repeat(4,minmax(0,1fr))] gap-2 text-[10px] font-semibold uppercase tracking-[0.16em] text-white/40">
              <span />
              {['Sleep', 'Focus', 'Break', 'Admin'].map((lane) => <span key={lane} className="truncate">{lane}</span>)}
            </div>
            <div className="grid grid-cols-[58px_1fr] gap-2">
              <TimeRail />
              <div className="relative grid grid-cols-4 overflow-hidden rounded-[10px] border border-white/[0.08] bg-black/20" style={{ height: dayHeight }}>
                {[0, 1, 2, 3].map((lane) => <div key={lane} className="border-r border-white/[0.055] last:border-r-0" />)}
                <div className="absolute inset-0">
                  <GridLines />
                  {entries.map((entry) => {
                    const lane = entry.action === 'Sleep' ? 0 : entry.action === 'Deep Work' || entry.action === 'Planning' ? 1 : entry.action === 'Break' || entry.action === 'Morning' ? 2 : 3;
                    return (
                      <article key={entry.id} className="absolute rounded-[6px] border border-[var(--activity-border)] bg-[var(--activity-soft)] px-2 py-1.5 transition hover:z-10 hover:bg-[color-mix(in_srgb,var(--activity)_20%,transparent)]" style={{ ...blockStyle(entry, 22), left: `calc(${lane * 25}% + 4px)`, width: 'calc(25% - 8px)' }}>
                        <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                        <strong className="block truncate text-[11px] font-semibold text-white">{entry.action}</strong>
                        {entry.durationMin > 42 && <span className="block truncate text-[10px] text-white/45">{entry.start}</span>}
                      </article>
                    );
                  })}
                </div>
              </div>
            </div>
          </section>
        </main>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const variants = [
        { id: 1, name: 'App-Native Inverted Day', component: Variant1 },
        { id: 2, name: 'Dense Sharp Blocks', component: Variant2 },
        { id: 3, name: 'Glass Calendar Canvas', component: Variant3 },
        { id: 4, name: 'Action Lane Calendar', component: Variant4 }
      ];

      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <div className="grid grid-cols-1 gap-8 md:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-xl border-2 bg-white/[0.03] p-4 transition ${selected === id ? 'border-sky-400 ring-2 ring-sky-400/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs text-white/40">VARIANT {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>

          <div className="fixed inset-x-0 bottom-0 border-t border-white/10 bg-[#080a12]/95 p-4 backdrop-blur-xl">
            <div className="mx-auto flex max-w-4xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => (
                <button key={id} onClick={() => setSelected(id)}
                  className={`rounded-lg px-4 py-2 text-sm font-medium transition ${selected === id ? 'bg-sky-500 text-white' : 'bg-white/10 text-white/70 hover:bg-white/15'}`}>
                  Select Variant {id}
                </button>
              ))}
              {selected && (
                <div className="mt-2 flex w-full gap-2">
                  <textarea value={comment} onChange={e => setComment(e.target.value)}
                    placeholder="What do you like? What should change?" rows={2}
                    className="min-w-0 flex-1 resize-none rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white outline-none placeholder:text-white/35 focus:border-sky-400" />
                  <button onClick={copyFeedback}
                    className="rounded-lg bg-sky-500 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-400">
                    {copied ? 'Copied!' : 'Copy feedback'}
                  </button>
                </div>
              )}
            </div>
          </div>
          {copied && <div className="fixed bottom-32 left-1/2 -translate-x-1/2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-black shadow-xl">Feedback copied!</div>}
          <div className="h-36" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
