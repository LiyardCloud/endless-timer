<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Dense Calendar Variants V2</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#070912] p-4 text-white sm:p-8" style="font-family: Avenir Next, Segoe UI, Helvetica Neue, Helvetica, Arial, sans-serif;">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-semibold">Timeline Dense Calendar - 4 Refined Variants</h1>
    <p class="mb-8 max-w-3xl text-sm text-white/55">Based on Variant 2: no visible main white border, sharper entries, and four approaches to short activities that avoid text overlap.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const entries = [
      { id: 1, action: 'Sleep', icon: 'S', color: '#818cf8', start: '00:00', end: '07:20', startMin: 0, durationMin: 440, title: 'Offline / sleep' },
      { id: 2, action: 'Morning', icon: 'M', color: '#fbbf24', start: '07:20', end: '08:10', startMin: 440, durationMin: 50, title: 'Coffee, planning, messages' },
      { id: 3, action: 'Focus', icon: 'F', color: '#6ee7b7', start: '08:10', end: '10:45', startMin: 490, durationMin: 155, title: 'Proposal outline and architecture cleanup' },
      { id: 4, action: 'Break', icon: 'B', color: '#fb7185', start: '10:45', end: '11:05', startMin: 645, durationMin: 20, title: 'Coffee and short walk' },
      { id: 5, action: 'Plan', icon: 'P', color: '#93c5fd', start: '11:05', end: '12:20', startMin: 665, durationMin: 75, title: 'Timeline calendar redesign notes' },
      { id: 6, action: 'Admin', icon: 'A', color: '#f0abfc', start: '13:10', end: '14:00', startMin: 790, durationMin: 50, title: 'Invoices and messages' },
      { id: 7, action: 'Focus', icon: 'F', color: '#6ee7b7', start: '14:00', end: 'Now', startMin: 840, durationMin: 110, title: 'Implementation pass' }
    ];

    const topMin = 950;
    const dayHeight = 620;
    const marks = [0, 120, 240, 360, 480, 600, 720, 840, 950];

    function y(min) {
      return dayHeight - (min / topMin) * dayHeight;
    }

    function label(min) {
      if (min === topMin) return 'Now';
      return `${String(Math.floor(min / 60)).padStart(2, '0')}:00`;
    }

    function blockStyle(entry, minHeight = 18) {
      return {
        bottom: `${entry.startMin / topMin * dayHeight}px`,
        height: `${Math.max(entry.durationMin / topMin * dayHeight, minHeight)}px`,
        backgroundColor: `${entry.color}24`,
        borderColor: `${entry.color}5c`,
        '--activity': entry.color
      };
    }

    function Header({ meta }) {
      return (
        <div className="rounded-[22px] bg-[repeating-linear-gradient(135deg,rgba(255,255,255,0.045)_0px,rgba(255,255,255,0.045)_1px,transparent_1px,transparent_9px),linear-gradient(135deg,rgba(38,92,255,0.26),rgba(7,9,16,0.9))] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-white/[0.06] px-3.5 py-3 shadow-[0_18px_48px_rgba(0,0,0,0.32)] backdrop-blur-xl">
            <div className="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-center">
              <div>
                <h2 className="text-lg font-semibold leading-tight">Saturday, May 23</h2>
                <p className="mt-1 text-xs text-white/55">{meta}</p>
              </div>
              <div className="flex items-center gap-2">
                <button className="flex h-9 items-center gap-2 rounded-full border border-white/[0.08] bg-black/20 px-3 text-sm hover:bg-black/30">
                  <span className="text-white/75">Cal</span>
                  <span>May 23</span>
                </button>
                <div className="flex items-center gap-1.5 rounded-full border border-white/[0.07] bg-black/18 p-1">
                  <button className="grid size-8 place-items-center rounded-full border border-white/[0.055] bg-black/20 hover:bg-black/30">Up</button>
                  <button className="grid size-8 place-items-center rounded-full border border-white/[0.055] bg-black/20 hover:bg-black/30">Dn</button>
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function TimeRail() {
      return (
        <div className="relative" style={{ height: dayHeight }}>
          {marks.map((mark) => <div key={mark} className="absolute right-0 font-mono text-[10px] font-bold text-white/30" style={{ top: y(mark) - 7 }}>{label(mark)}</div>)}
        </div>
      );
    }

    function Grid({ children, className = '' }) {
      return (
        <div className={`relative overflow-hidden bg-[linear-gradient(to_bottom,rgba(255,255,255,0.065)_1px,transparent_1px)] bg-[length:100%_39px] ${className}`} style={{ height: dayHeight }}>
          <div className="absolute inset-x-0 top-0 h-8 bg-gradient-to-b from-white/[0.045] to-transparent" />
          {children}
        </div>
      );
    }

    function Shell({ meta, children }) {
      return (
        <main className="space-y-4">
          <Header meta={meta} />
          <section className="rounded-[18px] bg-[#080b12]/92 p-4 shadow-[0_18px_48px_rgba(0,0,0,0.24)]">
            <div className="grid grid-cols-[52px_1fr] gap-3">
              <TimeRail />
              {children}
            </div>
          </section>
        </main>
      );
    }

    function Variant1() {
      return (
        <Shell meta="Short blocks collapse to icon + time">
          <Grid className="rounded-[6px]">
            {entries.map((entry) => {
              const compact = entry.durationMin < 32;
              return (
                <article key={entry.id} className="absolute left-1.5 right-1.5 overflow-hidden rounded-[3px] border px-2 py-1.5 transition hover:z-10 hover:ring-2 hover:ring-white/10" style={blockStyle(entry, 18)}>
                  <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                  {compact ? (
                    <div className="flex h-full items-center gap-2">
                      <span className="grid size-4 place-items-center bg-[var(--activity)] text-[9px] font-black text-black">{entry.icon}</span>
                      <span className="text-[10px] font-semibold text-white/78">{entry.start}</span>
                    </div>
                  ) : (
                    <div className="min-w-0">
                      <div className="flex items-center gap-2">
                        <strong className="truncate text-xs font-semibold">{entry.action}</strong>
                        <span className="text-[10px] text-white/38">{entry.start}</span>
                      </div>
                      {entry.durationMin > 42 && <p className="truncate text-[11px] text-white/48">{entry.title}</p>}
                    </div>
                  )}
                </article>
              );
            })}
          </Grid>
        </Shell>
      );
    }

    function Variant2() {
      return (
        <Shell meta="Short blocks use right-side labels">
          <Grid className="rounded-[6px] pr-20">
            {entries.map((entry) => {
              const compact = entry.durationMin < 34;
              return (
                <React.Fragment key={entry.id}>
                  <article className="absolute left-1.5 right-20 overflow-hidden rounded-[3px] border px-2 py-1.5 transition hover:z-10 hover:ring-2 hover:ring-white/10" style={blockStyle(entry, 16)}>
                    <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                    <strong className="truncate text-xs font-semibold">{compact ? entry.icon : entry.action}</strong>
                    {!compact && entry.durationMin > 42 && <p className="truncate text-[11px] text-white/48">{entry.title}</p>}
                  </article>
                  {compact && (
                    <div className="absolute right-1 top-auto flex h-5 items-center gap-1 rounded-[3px] bg-black/35 px-1.5 text-[10px] font-semibold text-white/72" style={{ bottom: `${entry.startMin / topMin * dayHeight}px` }}>
                      <span className="size-1.5 bg-[var(--activity)]" style={{ backgroundColor: entry.color }} />
                      {entry.action}
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </Grid>
        </Shell>
      );
    }

    function Variant3() {
      return (
        <Shell meta="Short blocks become thin event markers">
          <Grid className="rounded-[4px]">
            {entries.map((entry) => {
              const marker = entry.durationMin < 28;
              return (
                <article key={entry.id} className={`absolute left-1.5 right-1.5 overflow-visible rounded-[2px] border transition hover:z-10 ${marker ? 'px-0 py-0' : 'px-2 py-1.5'}`} style={blockStyle(entry, marker ? 8 : 18)}>
                  <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                  {marker ? (
                    <div className="absolute -top-4 left-0 rounded-[3px] bg-[#111722] px-1.5 py-0.5 text-[10px] font-semibold text-white/78 shadow-lg">
                      {entry.start} {entry.action}
                    </div>
                  ) : (
                    <>
                      <div className="flex items-center gap-2">
                        <strong className="truncate text-xs font-semibold">{entry.action}</strong>
                        <span className="text-[10px] text-white/38">{entry.start}</span>
                      </div>
                      {entry.durationMin > 42 && <p className="truncate text-[11px] text-white/48">{entry.title}</p>}
                    </>
                  )}
                </article>
              );
            })}
          </Grid>
        </Shell>
      );
    }

    function Variant4() {
      return (
        <Shell meta="Micro entries reserve a mini lane">
          <Grid className="rounded-[6px]">
            <div className="absolute bottom-0 top-0 right-0 w-16 bg-black/18" />
            {entries.map((entry) => {
              const compact = entry.durationMin < 34;
              return (
                <article key={entry.id} className={`absolute overflow-hidden rounded-[3px] border px-2 py-1.5 transition hover:z-10 hover:ring-2 hover:ring-white/10 ${compact ? 'right-1.5 left-[calc(100%-3.7rem)]' : 'left-1.5 right-[4.4rem]'}`} style={blockStyle(entry, compact ? 18 : 20)}>
                  <div className="absolute inset-x-0 bottom-0 h-[3px] bg-[var(--activity)]" />
                  {compact ? (
                    <div className="flex h-full items-center justify-center text-[10px] font-black text-white/80">{entry.icon}</div>
                  ) : (
                    <>
                      <div className="flex items-center gap-2">
                        <strong className="truncate text-xs font-semibold">{entry.action}</strong>
                        <span className="text-[10px] text-white/38">{entry.start}</span>
                      </div>
                      {entry.durationMin > 42 && <p className="truncate text-[11px] text-white/48">{entry.title}</p>}
                    </>
                  )}
                </article>
              );
            })}
          </Grid>
        </Shell>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);
      const variants = [
        { id: 1, name: 'Inline Micro Summary', component: Variant1 },
        { id: 2, name: 'Side Labels', component: Variant2 },
        { id: 3, name: 'Event Marker Callouts', component: Variant3 },
        { id: 4, name: 'Reserved Mini Lane', component: Variant4 }
      ];
      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };
      return (
        <div>
          <div className="grid grid-cols-1 gap-8 md:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-xl border-2 bg-white/[0.03] p-4 transition ${selected === id ? 'border-sky-400 ring-2 ring-sky-400/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs text-white/40">VARIANT {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>
          <div className="fixed inset-x-0 bottom-0 border-t border-white/10 bg-[#080a12]/95 p-4 backdrop-blur-xl">
            <div className="mx-auto flex max-w-4xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => <button key={id} onClick={() => setSelected(id)} className={`rounded-lg px-4 py-2 text-sm font-medium ${selected === id ? 'bg-sky-500 text-white' : 'bg-white/10 text-white/70 hover:bg-white/15'}`}>Select Variant {id}</button>)}
              {selected && (
                <div className="mt-2 flex w-full gap-2">
                  <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="What do you like? What should change?" rows={2} className="min-w-0 flex-1 resize-none rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white outline-none placeholder:text-white/35 focus:border-sky-400" />
                  <button onClick={copyFeedback} className="rounded-lg bg-sky-500 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-400">{copied ? 'Copied!' : 'Copy feedback'}</button>
                </div>
              )}
            </div>
          </div>
          {copied && <div className="fixed bottom-32 left-1/2 -translate-x-1/2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-black shadow-xl">Feedback copied!</div>}
          <div className="h-36" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
