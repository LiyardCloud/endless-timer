<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Panel Compact Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Avenir Next', 'Segoe UI', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['SF Mono', 'Monaco', 'Cascadia Code', 'monospace']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[#070910] p-4 text-[#eef3ff] sm:p-8">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-semibold">Timeline Panel - Compact Variants</h1>
    <p class="mb-8 max-w-2xl text-sm text-[#9aa3b7]">Four options for tightening the Timeline day selector panel while preserving the current dark, minimalist EndlessTimer direction.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const ArrowLeftIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="m12 19-7-7 7-7" /><path d="M19 12H5" />
      </svg>
    );

    const ArrowRightIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
      </svg>
    );

    const CalendarIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M8 2v4" /><path d="M16 2v4" /><rect width="18" height="18" x="3" y="4" rx="2" /><path d="M3 10h18" />
      </svg>
    );

    const sharedDate = "05/21/2026";
    const sharedLongDate = "May 21, 2026";

    function MiniArrowButtons({ className = "" }) {
      return (
        <div className={`flex items-center gap-1.5 ${className}`}>
          <button className="inline-flex size-8 items-center justify-center rounded-full border border-white/10 bg-white/[0.035] text-[#eef3ff] transition hover:-translate-y-0.5 hover:bg-white/[0.08]" aria-label="Previous day">
            <ArrowLeftIcon />
          </button>
          <button className="inline-flex size-8 items-center justify-center rounded-full border border-white/10 bg-white/[0.035] text-[#eef3ff] transition hover:-translate-y-0.5 hover:bg-white/[0.08]" aria-label="Next day">
            <ArrowRightIcon />
          </button>
        </div>
      );
    }

    function Variant1() {
      return (
        <section className="rounded-[18px] border border-white/10 bg-[#10131b] px-4 py-3 shadow-[0_16px_40px_rgba(0,0,0,0.22)]">
          <div className="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div className="min-w-0">
              <div className="text-[10px] font-semibold uppercase tracking-[0.24em] text-[#8d96aa]">Timeline</div>
              <div className="mt-1 flex flex-wrap items-baseline gap-x-3 gap-y-1">
                <h2 className="text-lg font-semibold text-white">Today</h2>
                <p className="text-sm text-[#9aa3b7]">Entries for {sharedLongDate}</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <label className="relative">
                <span className="sr-only">Selected day</span>
                <input type="date" defaultValue="2026-05-21" className="h-9 w-[152px] rounded-full border border-white/10 bg-white/[0.045] px-3 text-sm text-white outline-none transition focus:border-white/25 focus:ring-4 focus:ring-[#265cff]/20" />
              </label>
              <MiniArrowButtons />
            </div>
          </div>
        </section>
      );
    }

    function Variant2() {
      return (
        <section className="overflow-hidden rounded-[16px] border border-[#2f66ff]/35 bg-[#0b0e16] shadow-[0_18px_44px_rgba(38,92,255,0.12)]">
          <div className="grid gap-0 sm:grid-cols-[1fr_auto]">
            <div className="flex min-w-0 items-center gap-3 px-4 py-3">
              <div className="flex size-10 shrink-0 items-center justify-center rounded-xl bg-[#265cff] text-white">
                <CalendarIcon />
              </div>
              <div className="min-w-0">
                <div className="text-[10px] font-bold uppercase tracking-[0.22em] text-[#7f8ba4]">Timeline</div>
                <div className="truncate text-xl font-bold leading-tight text-white">Today</div>
              </div>
              <div className="ml-auto hidden rounded-full border border-white/10 bg-white/[0.04] px-3 py-1.5 text-xs font-semibold text-[#cfd7ea] sm:block">
                {sharedLongDate}
              </div>
            </div>
            <div className="flex items-center gap-2 border-t border-white/8 bg-white/[0.025] px-4 py-3 sm:border-l sm:border-t-0">
              <button className="inline-flex size-9 items-center justify-center rounded-full bg-white text-[#070910] transition hover:-translate-y-0.5" aria-label="Previous day">
                <ArrowLeftIcon />
              </button>
              <input type="date" defaultValue="2026-05-21" className="h-9 w-full rounded-full border border-white/10 bg-[#151925] px-3 text-sm text-white outline-none focus:ring-4 focus:ring-[#265cff]/25 sm:w-[150px]" />
              <button className="inline-flex size-9 items-center justify-center rounded-full bg-white text-[#070910] transition hover:-translate-y-0.5" aria-label="Next day">
                <ArrowRightIcon />
              </button>
            </div>
          </div>
        </section>
      );
    }

    function Variant3() {
      return (
        <div className="rounded-[22px] bg-[radial-gradient(circle_at_15%_10%,rgba(38,92,255,0.36),transparent_30%),radial-gradient(circle_at_82%_20%,rgba(230,129,57,0.22),transparent_26%),linear-gradient(135deg,#121826,#070910)] p-px">
          <section className="rounded-[21px] border border-white/15 bg-white/[0.08] px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <div className="grid gap-3 md:grid-cols-[1fr_auto] md:items-center">
              <div className="flex min-w-0 items-center gap-3">
                <div className="hidden h-10 w-px rounded-full bg-white/20 sm:block" />
                <div className="min-w-0">
                  <div className="text-[10px] font-semibold uppercase tracking-[0.26em] text-white/55">Timeline</div>
                  <div className="mt-0.5 flex flex-wrap items-center gap-2">
                    <h2 className="text-lg font-semibold text-white">Today</h2>
                    <span className="rounded-full border border-white/15 bg-white/[0.08] px-2.5 py-1 text-xs text-white/70">{sharedLongDate}</span>
                  </div>
                </div>
              </div>
              <div className="flex items-center gap-2">
                <button className="inline-flex size-9 items-center justify-center rounded-full border border-white/15 bg-white/[0.08] text-white transition hover:bg-white/[0.14]" aria-label="Previous day">
                  <ArrowLeftIcon />
                </button>
                <label className="flex h-9 min-w-0 flex-1 items-center gap-2 rounded-full border border-white/15 bg-black/20 px-3 text-sm text-white md:w-[160px]">
                  <CalendarIcon />
                  <input type="date" defaultValue="2026-05-21" className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none [color-scheme:dark]" />
                </label>
                <button className="inline-flex size-9 items-center justify-center rounded-full border border-white/15 bg-white/[0.08] text-white transition hover:bg-white/[0.14]" aria-label="Next day">
                  <ArrowRightIcon />
                </button>
              </div>
            </div>
          </section>
        </div>
      );
    }

    function Variant4() {
      return (
        <section className="border-2 border-white bg-[#090a0d] text-white shadow-[8px_8px_0_#265cff]">
          <div className="grid grid-cols-1 md:grid-cols-[150px_1fr_auto]">
            <div className="border-b-2 border-white px-3 py-2 md:border-b-0 md:border-r-2">
              <div className="font-mono text-[10px] font-bold uppercase tracking-[0.22em] text-[#aeb7ca]">Timeline</div>
              <h2 className="mt-0.5 text-2xl font-black uppercase leading-none">Today</h2>
            </div>
            <div className="flex min-w-0 items-center border-b-2 border-white px-3 py-2 md:border-b-0 md:border-r-2">
              <p className="truncate font-mono text-sm uppercase tracking-[0.08em] text-[#eef3ff]">Showing: {sharedLongDate}</p>
            </div>
            <div className="flex items-center gap-0">
              <button className="inline-flex h-11 w-12 items-center justify-center border-r-2 border-white bg-[#eef3ff] text-[#070910] transition hover:bg-[#dce6ff]" aria-label="Previous day">
                <ArrowLeftIcon />
              </button>
              <input type="date" defaultValue="2026-05-21" className="h-11 w-[150px] border-0 bg-[#090a0d] px-2 font-mono text-xs uppercase text-white outline-none [color-scheme:dark]" />
              <button className="inline-flex h-11 w-12 items-center justify-center border-l-2 border-white bg-[#eef3ff] text-[#070910] transition hover:bg-[#dce6ff]" aria-label="Next day">
                <ArrowRightIcon />
              </button>
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const variants = [
        { id: 1, name: 'Minimal/Clean', component: Variant1 },
        { id: 2, name: 'Modern/Bold', component: Variant2 },
        { id: 3, name: 'Glass/Soft', component: Variant3 },
        { id: 4, name: 'Brutalist/Editorial', component: Variant4 },
      ];

      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <div className="grid grid-cols-1 gap-6 pb-12 md:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-[22px] border-2 bg-[#0c1019] p-4 transition-all ${selected === id ? 'border-[#265cff] ring-2 ring-[#265cff]/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs uppercase tracking-[0.18em] text-[#8d96aa]">Variant {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>

          <div className="fixed bottom-0 left-0 right-0 border-t border-white/10 bg-[#0a0d14]/95 p-4 text-white backdrop-blur">
            <div className="mx-auto flex max-w-5xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => (
                <button key={id} onClick={() => setSelected(id)}
                  className={`rounded-full px-4 py-2 text-sm font-medium transition ${selected === id ? 'bg-[#eef3ff] text-[#090d14]' : 'bg-white/[0.06] text-[#eef3ff] hover:bg-white/[0.1]'}`}>
                  Select Variant {id}
                </button>
              ))}
              {selected && (
                <div className="mt-2 flex w-full flex-col gap-2 sm:flex-row">
                  <textarea value={comment} onChange={e => setComment(e.target.value)}
                    placeholder="What do you like? What should change?" rows={2}
                    className="min-h-16 flex-1 rounded-xl border border-white/12 bg-white/[0.04] px-3 py-2 text-sm text-white outline-none placeholder:text-[#8d96aa] focus:ring-4 focus:ring-[#265cff]/25" />
                  <button onClick={copyFeedback}
                    className="rounded-xl bg-[#265cff] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#3f70ff]">
                    {copied ? 'Feedback copied!' : 'Copy feedback'}
                  </button>
                </div>
              )}
            </div>
          </div>
          <div className="h-32" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
