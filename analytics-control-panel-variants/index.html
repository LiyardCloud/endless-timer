<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Control Panel Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Avenir Next', 'Segoe UI', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['SF Mono', 'Monaco', 'Cascadia Code', 'monospace']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_12%_8%,rgba(38,92,255,0.18),transparent_28%),radial-gradient(circle_at_86%_18%,rgba(230,129,57,0.12),transparent_24%),linear-gradient(180deg,#0c1019,#06070d)] p-4 text-[#eef3ff] sm:p-8">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-semibold">Analytics Control Panel - 4 Variants</h1>
    <p class="mb-8 max-w-2xl text-sm text-[#9aa3b7]">Compact options for the Analytics range and activity filter controls, using the saved glass-panel preferences.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const presets = ["Today", "Last 7 days", "Last 30 days", "Custom"];
    const activities = ["All activities", "Deep Work", "Admin", "Learning"];

    const CalendarIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M8 2v4" /><path d="M16 2v4" /><rect width="18" height="18" x="3" y="4" rx="2" /><path d="M3 10h18" />
      </svg>
    );

    const FilterIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3Z" />
      </svg>
    );

    function DateField({ label, value }) {
      return (
        <label className="min-w-0">
          <span className="mb-1.5 block text-[10px] font-semibold uppercase tracking-[0.18em] text-white/45">{label}</span>
          <span className="flex h-9 min-w-0 items-center gap-2 rounded-full border border-white/[0.08] bg-black/20 px-3 text-sm text-white">
            <CalendarIcon />
            <input type="date" defaultValue={value} className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none [color-scheme:dark]" />
          </span>
        </label>
      );
    }

    function ActivitySelect({ className = "" }) {
      return (
        <label className={`min-w-0 ${className}`}>
          <span className="mb-1.5 block text-[10px] font-semibold uppercase tracking-[0.18em] text-white/45">Activity filter</span>
          <span className="flex h-9 min-w-0 items-center gap-2 rounded-full border border-white/[0.08] bg-black/20 px-3 text-sm text-white">
            <FilterIcon />
            <select defaultValue="all" className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none">
              {activities.map((activity) => <option key={activity} className="bg-[#0b1020] text-white">{activity}</option>)}
            </select>
          </span>
        </label>
      );
    }

    function Presets({ active = "Today", compact = false }) {
      return (
        <div className={`flex ${compact ? 'gap-1.5 overflow-x-auto rounded-full border border-white/[0.07] bg-black/18 p-1' : 'flex-wrap gap-2'}`}>
          {presets.map((preset) => (
            <button key={preset} className={`whitespace-nowrap rounded-full border px-3 py-1.5 text-xs font-semibold transition hover:bg-black/30 ${preset === active ? 'border-white/[0.12] bg-black/30 text-white' : 'border-white/[0.07] bg-black/20 text-white/62'}`}>
              {preset}
            </button>
          ))}
        </div>
      );
    }

    function Variant1() {
      return (
        <div className="rounded-[22px] bg-[repeating-linear-gradient(135deg,rgba(255,255,255,0.045)_0px,rgba(255,255,255,0.045)_1px,transparent_1px,transparent_9px),linear-gradient(135deg,rgba(38,92,255,0.26),rgba(7,9,16,0.9))] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-white/[0.06] px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <div className="grid gap-3 lg:grid-cols-[1fr_auto] lg:items-center">
              <div className="min-w-0">
                <div className="text-[10px] font-semibold uppercase tracking-[0.26em] text-white/55">Analytics</div>
                <div className="mt-0.5 flex min-w-0 flex-wrap items-center gap-x-2 gap-y-1">
                  <h2 className="text-lg font-semibold leading-tight text-white">Activity breakdown</h2>
                  <span className="truncate text-xs text-white/55">May 16, 2026 - May 22, 2026</span>
                </div>
              </div>
              <Presets compact />
            </div>
            <div className="mt-3 grid gap-2 sm:grid-cols-[1fr_1fr_1.2fr]">
              <DateField label="From" value="2026-05-16" />
              <DateField label="To" value="2026-05-22" />
              <ActivitySelect />
            </div>
          </section>
        </div>
      );
    }

    function Variant2() {
      return (
        <div className="rounded-[22px] bg-[linear-gradient(135deg,rgba(38,92,255,0.34),rgba(230,129,57,0.16)_55%,rgba(255,255,255,0.08))] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-[#0f1420]/78 px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <div className="grid gap-3 xl:grid-cols-[180px_1fr] xl:items-end">
              <div>
                <div className="text-[10px] font-semibold uppercase tracking-[0.26em] text-white/55">Analytics</div>
                <h2 className="mt-0.5 text-lg font-semibold leading-tight text-white">Activity breakdown</h2>
              </div>
              <div className="grid gap-2 md:grid-cols-[1.35fr_1fr_1fr_1.2fr] md:items-end">
                <div>
                  <span className="mb-1.5 block text-[10px] font-semibold uppercase tracking-[0.18em] text-white/45">Range</span>
                  <Presets compact />
                </div>
                <DateField label="From" value="2026-05-16" />
                <DateField label="To" value="2026-05-22" />
                <ActivitySelect />
              </div>
            </div>
          </section>
        </div>
      );
    }

    function Variant3() {
      return (
        <div className="rounded-[22px] bg-[radial-gradient(circle_at_0%_50%,rgba(38,92,255,0.38),transparent_34%),radial-gradient(circle_at_100%_40%,rgba(230,129,57,0.18),transparent_30%),linear-gradient(135deg,#121826,#070910)] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-white/[0.055] p-2 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <div className="grid gap-2 rounded-[17px] bg-black/18 p-2 lg:grid-cols-[auto_1fr] lg:items-center">
              <div className="rounded-full border border-white/[0.07] bg-black/20 px-3 py-1.5 text-[10px] font-semibold uppercase tracking-[0.22em] text-white/55">Analytics</div>
              <div className="grid gap-2 xl:grid-cols-[1fr_auto] xl:items-center">
                <div className="min-w-0">
                  <h2 className="text-lg font-semibold leading-tight text-white">Activity breakdown</h2>
                  <p className="truncate text-xs text-white/55">May 16, 2026 - May 22, 2026</p>
                </div>
                <Presets compact />
              </div>
            </div>
            <div className="mt-2 grid gap-2 md:grid-cols-[1fr_1fr_1.2fr]">
              <DateField label="From" value="2026-05-16" />
              <DateField label="To" value="2026-05-22" />
              <ActivitySelect />
            </div>
          </section>
        </div>
      );
    }

    function Variant4() {
      return (
        <section className="rounded-[16px] border border-white/[0.08] bg-[#0c1019]/86 px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.28)]">
          <div className="grid gap-3">
            <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
              <div>
                <div className="text-[10px] font-semibold uppercase tracking-[0.26em] text-white/45">Analytics</div>
                <h2 className="mt-0.5 text-lg font-semibold leading-tight text-white">Activity breakdown</h2>
              </div>
              <Presets />
            </div>
            <div className="grid gap-2 md:grid-cols-[1fr_1fr_1.2fr]">
              <DateField label="From" value="2026-05-16" />
              <DateField label="To" value="2026-05-22" />
              <ActivitySelect />
            </div>
          </div>
        </section>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const variants = [
        { id: 1, name: 'Timeline Match', component: Variant1 },
        { id: 2, name: 'Dense Workbench', component: Variant2 },
        { id: 3, name: 'Inset Filter Rail', component: Variant3 },
        { id: 4, name: 'Quiet Flat', component: Variant4 },
      ];

      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <div className="grid grid-cols-1 gap-6 pb-12 xl:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-[22px] border-2 bg-[#0c1019]/82 p-4 transition-all ${selected === id ? 'border-[#265cff] ring-2 ring-[#265cff]/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs uppercase tracking-[0.18em] text-[#8d96aa]">Variant {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>

          <div className="fixed bottom-0 left-0 right-0 border-t border-white/10 bg-[#0a0d14]/95 p-4 text-white backdrop-blur">
            <div className="mx-auto flex max-w-5xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => (
                <button key={id} onClick={() => setSelected(id)}
                  className={`rounded-full px-4 py-2 text-sm font-medium transition ${selected === id ? 'bg-[#eef3ff] text-[#090d14]' : 'bg-white/[0.06] text-[#eef3ff] hover:bg-white/[0.1]'}`}>
                  Select Variant {id}
                </button>
              ))}
              {selected && (
                <div className="mt-2 flex w-full flex-col gap-2 sm:flex-row">
                  <textarea value={comment} onChange={e => setComment(e.target.value)}
                    placeholder="What do you like? What should change?" rows={2}
                    className="min-h-16 flex-1 rounded-xl border border-white/12 bg-white/[0.04] px-3 py-2 text-sm text-white outline-none placeholder:text-[#8d96aa] focus:ring-4 focus:ring-[#265cff]/25" />
                  <button onClick={copyFeedback}
                    className="rounded-xl bg-[#265cff] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#3f70ff]">
                    {copied ? 'Feedback copied!' : 'Copy feedback'}
                  </button>
                </div>
              )}
            </div>
          </div>
          <div className="h-32" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
