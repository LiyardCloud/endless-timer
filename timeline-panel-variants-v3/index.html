<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Panel Background Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Avenir Next', 'Segoe UI', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['SF Mono', 'Monaco', 'Cascadia Code', 'monospace']
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_12%_8%,rgba(38,92,255,0.18),transparent_28%),radial-gradient(circle_at_86%_18%,rgba(230,129,57,0.12),transparent_24%),linear-gradient(180deg,#0c1019,#06070d)] p-4 text-[#eef3ff] sm:p-8">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-semibold">Timeline Panel - Background Options</h1>
    <p class="mb-8 max-w-2xl text-sm text-[#9aa3b7]">Focused on v2 Variant 6, with the date control first and previous/next arrows moved to the right side.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const longDate = "May 22, 2026";

    const ArrowLeftIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="m12 19-7-7 7-7" /><path d="M19 12H5" />
      </svg>
    );

    const ArrowRightIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
      </svg>
    );

    const CalendarIcon = () => (
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="size-4" aria-hidden="true">
        <path d="M8 2v4" /><path d="M16 2v4" /><rect width="18" height="18" x="3" y="4" rx="2" /><path d="M3 10h18" />
      </svg>
    );

    function ArrowControls() {
      return (
        <div className="flex items-center gap-1.5 rounded-full border border-white/[0.07] bg-black/18 p-1">
          <button className="inline-flex size-8 items-center justify-center rounded-full border border-white/[0.055] bg-black/20 text-white transition hover:border-white/[0.09] hover:bg-black/30" aria-label="Previous day"><ArrowLeftIcon /></button>
          <button className="inline-flex size-8 items-center justify-center rounded-full border border-white/[0.055] bg-black/20 text-white transition hover:border-white/[0.09] hover:bg-black/30" aria-label="Next day"><ArrowRightIcon /></button>
        </div>
      );
    }

    function DateInput() {
      return (
        <label className="flex h-9 min-w-0 items-center gap-2 rounded-full border border-white/[0.08] bg-black/20 px-3 text-sm text-white sm:w-[170px]">
          <CalendarIcon />
          <input type="date" defaultValue="2026-05-22" className="min-w-0 flex-1 bg-transparent text-sm text-white outline-none [color-scheme:dark]" />
        </label>
      );
    }

    function Content() {
      return (
        <div className="grid gap-3 sm:grid-cols-[1fr_auto] sm:items-center">
          <div className="min-w-0">
            <div className="text-[10px] font-semibold uppercase tracking-[0.26em] text-white/55">Timeline</div>
            <div className="mt-0.5 flex min-w-0 flex-wrap items-center gap-x-2 gap-y-1">
              <h2 className="text-lg font-semibold leading-tight text-white">Today</h2>
              <span className="truncate text-xs text-white/55">{longDate}</span>
            </div>
          </div>
          <div className="flex min-w-0 items-center gap-2">
            <DateInput />
            <ArrowControls />
          </div>
        </div>
      );
    }

    function Variant1() {
      return (
        <div className="rounded-[22px] bg-[linear-gradient(135deg,rgba(38,92,255,0.42),rgba(230,129,57,0.22)_48%,rgba(255,255,255,0.11))] p-px">
          <section className="rounded-[21px] border border-white/15 bg-white/[0.08] px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <Content />
          </section>
        </div>
      );
    }

    function Variant2() {
      return (
        <div className="rounded-[22px] bg-[radial-gradient(circle_at_0%_50%,rgba(38,92,255,0.42),transparent_34%),radial-gradient(circle_at_100%_50%,rgba(230,129,57,0.24),transparent_32%),linear-gradient(135deg,#141927,#080a10)] p-px">
          <section className="rounded-[21px] border border-white/14 bg-[#111620]/72 px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <Content />
          </section>
        </div>
      );
    }

    function Variant3() {
      return (
        <div className="rounded-[22px] bg-[repeating-linear-gradient(135deg,rgba(255,255,255,0.045)_0px,rgba(255,255,255,0.045)_1px,transparent_1px,transparent_9px),linear-gradient(135deg,rgba(38,92,255,0.26),rgba(7,9,16,0.9))] p-px">
          <section className="rounded-[21px] border border-white/[0.08] bg-white/[0.06] px-3.5 py-3 shadow-[0_18px_55px_rgba(0,0,0,0.34)] backdrop-blur-xl">
            <Content />
          </section>
        </div>
      );
    }

    function Variant4() {
      return (
        <div className="rounded-[22px] bg-[linear-gradient(180deg,rgba(255,255,255,0.18),rgba(255,255,255,0.04)),radial-gradient(circle_at_18%_0%,rgba(38,92,255,0.34),transparent_34%)] p-px shadow-[0_22px_60px_rgba(38,92,255,0.1)]">
          <section className="rounded-[21px] border border-white/12 bg-black/30 px-3.5 py-3 shadow-[inset_0_1px_0_rgba(255,255,255,0.08)] backdrop-blur-xl">
            <Content />
          </section>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const variants = [
        { id: 1, name: 'Edge Glow', component: Variant1 },
        { id: 2, name: 'Side Wash', component: Variant2 },
        { id: 3, name: 'Fine Texture', component: Variant3 },
        { id: 4, name: 'Subtle Chrome', component: Variant4 },
      ];

      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <div className="grid grid-cols-1 gap-6 pb-12 md:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-[22px] border-2 bg-[#0c1019]/82 p-4 transition-all ${selected === id ? 'border-[#265cff] ring-2 ring-[#265cff]/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs uppercase tracking-[0.18em] text-[#8d96aa]">Variant {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>

          <div className="fixed bottom-0 left-0 right-0 border-t border-white/10 bg-[#0a0d14]/95 p-4 text-white backdrop-blur">
            <div className="mx-auto flex max-w-5xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => (
                <button key={id} onClick={() => setSelected(id)}
                  className={`rounded-full px-4 py-2 text-sm font-medium transition ${selected === id ? 'bg-[#eef3ff] text-[#090d14]' : 'bg-white/[0.06] text-[#eef3ff] hover:bg-white/[0.1]'}`}>
                  Select Variant {id}
                </button>
              ))}
              {selected && (
                <div className="mt-2 flex w-full flex-col gap-2 sm:flex-row">
                  <textarea value={comment} onChange={e => setComment(e.target.value)}
                    placeholder="What do you like? What should change?" rows={2}
                    className="min-h-16 flex-1 rounded-xl border border-white/12 bg-white/[0.04] px-3 py-2 text-sm text-white outline-none placeholder:text-[#8d96aa] focus:ring-4 focus:ring-[#265cff]/25" />
                  <button onClick={copyFeedback}
                    className="rounded-xl bg-[#265cff] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[#3f70ff]">
                    {copied ? 'Feedback copied!' : 'Copy feedback'}
                  </button>
                </div>
              )}
            </div>
          </div>
          <div className="h-32" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
