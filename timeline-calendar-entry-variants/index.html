<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Calendar Entries Variants</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#070912] p-4 text-white sm:p-8" style="font-family: Inter, system-ui, sans-serif;">
  <div class="mx-auto max-w-7xl">
    <h1 class="mb-2 text-2xl font-bold">Timeline Calendar Entries - 4 Variants</h1>
    <p class="mb-8 max-w-3xl text-sm text-white/55">Calendar-like redesign explorations for EndlessTimer timeline entries. The date control is assumed to stay compact; these focus on how a selected day can read more like a calendar.</p>
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const entries = [
      { id: 1, action: 'Deep Work', icon: 'Focus', color: '#6ee7b7', start: '08:10', end: '10:45', duration: '2h 35m', title: 'Proposal outline and architecture cleanup', active: false },
      { id: 2, action: 'Break', icon: 'Pause', color: '#fbbf24', start: '10:45', end: '11:05', duration: '20m', title: 'Coffee and short walk', active: false },
      { id: 3, action: 'Planning', icon: 'Plan', color: '#93c5fd', start: '11:05', end: '12:20', duration: '1h 15m', title: 'Timeline calendar redesign notes', active: false },
      { id: 4, action: 'Admin', icon: 'Inbox', color: '#fda4af', start: '13:10', end: '14:00', duration: '50m', title: 'Invoices and messages', active: false },
      { id: 5, action: 'Deep Work', icon: 'Focus', color: '#6ee7b7', start: '14:00', end: 'Now', duration: '1h 42m', title: 'Implementation pass', active: true },
    ];

    const hours = ['08', '09', '10', '11', '12', '13', '14', '15'];

    function EntryActions({ dark = false }) {
      return (
        <div className="flex items-center gap-1">
          <button className={`grid size-7 place-items-center rounded-full transition ${dark ? 'text-white/50 hover:bg-white/10 hover:text-white' : 'text-slate-400 hover:bg-slate-100 hover:text-slate-800'}`} aria-label="Edit entry">
            <svg className="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </button>
          <button className={`grid size-7 place-items-center rounded-full transition ${dark ? 'text-white/50 hover:bg-rose-500/15 hover:text-rose-200' : 'text-slate-400 hover:bg-rose-50 hover:text-rose-600'}`} aria-label="Delete entry">
            <svg className="size-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
              <path d="M3 6h18" />
              <path d="M8 6V4h8v2" />
              <path d="M19 6l-1 14H6L5 6" />
              <path d="M10 11v5" />
              <path d="M14 11v5" />
            </svg>
          </button>
        </div>
      );
    }

    function Variant1() {
      return (
        <section className="rounded-lg bg-[#f8fafc] p-5 text-slate-950 shadow-sm">
          <div className="mb-5 flex items-end justify-between border-b border-slate-200 pb-4">
            <div>
              <p className="text-xs font-medium uppercase text-slate-400">Saturday</p>
              <h2 className="text-3xl font-semibold">May 23</h2>
            </div>
            <div className="text-right">
              <p className="text-xs text-slate-400">Tracked</p>
              <p className="text-lg font-semibold">6h 42m</p>
            </div>
          </div>
          <div className="grid grid-cols-[54px_1fr] gap-x-4">
            {entries.map((entry) => (
              <React.Fragment key={entry.id}>
                <div className="pt-4 text-right text-xs font-medium text-slate-400">{entry.start}</div>
                <article className="group border-l border-slate-200 py-2 pl-4">
                  <div className="rounded-md border border-slate-200 bg-white px-3 py-3 transition hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-md">
                    <div className="flex items-start justify-between gap-3">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="size-2.5 rounded-full" style={{ backgroundColor: entry.color }} />
                          <strong className="text-sm">{entry.action}</strong>
                          {entry.active && <span className="rounded-full bg-emerald-50 px-2 py-0.5 text-[11px] font-semibold text-emerald-700">Active</span>}
                        </div>
                        <p className="mt-1 truncate text-sm text-slate-500">{entry.title}</p>
                      </div>
                      <div className="shrink-0 text-right">
                        <p className="text-xs font-medium text-slate-500">{entry.duration}</p>
                        <EntryActions />
                      </div>
                    </div>
                  </div>
                </article>
              </React.Fragment>
            ))}
          </div>
        </section>
      );
    }

    function Variant2() {
      const positions = [0, 2.2, 3.15, 5.1, 6];
      const spans = [2.6, 0.6, 1.25, 0.8, 1.7];
      return (
        <section className="rounded-lg bg-[#101014] p-5 text-white shadow-2xl">
          <div className="mb-5 flex items-center justify-between">
            <div>
              <h2 className="font-['Space_Grotesk'] text-4xl font-bold leading-none">23</h2>
              <p className="mt-1 text-sm font-semibold uppercase text-lime-300">May / Saturday</p>
            </div>
            <div className="rounded-full bg-lime-300 px-4 py-2 text-sm font-extrabold text-black">5 entries</div>
          </div>
          <div className="grid grid-cols-[44px_1fr] gap-3">
            <div className="space-y-[34px] pt-1">
              {hours.map((hour) => <div key={hour} className="text-xs font-bold text-white/35">{hour}:00</div>)}
            </div>
            <div className="relative min-h-[360px] border-l border-white/15 bg-[linear-gradient(to_bottom,rgba(255,255,255,0.08)_1px,transparent_1px)] bg-[length:100%_45px]">
              {entries.map((entry, index) => (
                <article
                  key={entry.id}
                  className="absolute left-3 right-0 rounded-md border-2 border-black bg-white p-3 text-black shadow-[5px_5px_0_#bef264] transition hover:-translate-y-1"
                  style={{ top: `${positions[index] * 45}px`, minHeight: `${Math.max(spans[index] * 45, 54)}px` }}
                >
                  <div className="flex items-start justify-between gap-2">
                    <div>
                      <p className="text-[11px] font-extrabold uppercase">{entry.start} - {entry.end}</p>
                      <h3 className="text-sm font-extrabold">{entry.action}</h3>
                      <p className="mt-1 line-clamp-2 text-xs font-medium text-black/65">{entry.title}</p>
                    </div>
                    <span className="rounded-full px-2 py-1 text-[10px] font-black text-black" style={{ backgroundColor: entry.color }}>{entry.duration}</span>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Variant3() {
      return (
        <section className="relative overflow-hidden rounded-[28px] bg-[radial-gradient(circle_at_top_left,#5eead4,transparent_35%),radial-gradient(circle_at_bottom_right,#818cf8,transparent_36%),linear-gradient(135deg,#101827,#05060b)] p-5 text-white">
          <div className="absolute inset-0 bg-white/[0.03]" />
          <div className="relative rounded-[24px] border border-white/15 bg-white/10 p-4 shadow-2xl backdrop-blur-xl">
            <div className="mb-5 flex flex-wrap items-center justify-between gap-3">
              <div>
                <p className="text-xs uppercase text-white/50">Calendar board</p>
                <h2 className="text-2xl font-semibold">Today</h2>
              </div>
              <div className="rounded-full border border-white/10 bg-black/20 px-3 py-1.5 text-xs text-white/70">08:10 - now</div>
            </div>
            <div className="grid gap-2">
              {entries.map((entry) => (
                <article key={entry.id} className="group grid grid-cols-[72px_1fr] overflow-hidden rounded-2xl border border-white/10 bg-white/[0.08] backdrop-blur transition hover:bg-white/[0.12]">
                  <div className="border-r border-white/10 bg-black/15 p-3">
                    <p className="text-sm font-semibold">{entry.start}</p>
                    <p className="mt-1 text-[11px] text-white/45">{entry.duration}</p>
                  </div>
                  <div className="p-3">
                    <div className="flex items-start justify-between gap-3">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="grid size-7 place-items-center rounded-full text-[10px] font-bold text-black" style={{ backgroundColor: entry.color }}>{entry.icon.slice(0, 1)}</span>
                          <strong className="text-sm">{entry.action}</strong>
                          {entry.active && <span className="rounded-full bg-white/10 px-2 py-0.5 text-[10px] uppercase text-emerald-200">Active</span>}
                        </div>
                        <p className="mt-2 text-sm leading-5 text-white/62">{entry.title}</p>
                      </div>
                      <EntryActions dark />
                    </div>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Variant4() {
      return (
        <section className="bg-[#f4f1e8] p-4 text-black">
          <div className="mb-4 grid grid-cols-[1fr_auto] border-4 border-black bg-[#fffbeb]">
            <div className="p-3">
              <p className="font-['Space_Grotesk'] text-xs font-bold uppercase">Daily ledger</p>
              <h2 className="font-['Space_Grotesk'] text-3xl font-bold">SAT 23 MAY</h2>
            </div>
            <div className="border-l-4 border-black bg-[#facc15] p-3 text-right font-black">
              <p className="text-2xl">6:42</p>
              <p className="text-xs">tracked</p>
            </div>
          </div>
          <div className="grid gap-2">
            {entries.map((entry, index) => (
              <article key={entry.id} className={`grid border-4 border-black bg-white shadow-[6px_6px_0_#000] transition hover:-translate-x-1 hover:-translate-y-1 ${index % 2 ? 'ml-7' : 'mr-7'}`}>
                <div className="grid grid-cols-[86px_1fr]">
                  <div className="border-r-4 border-black p-2 font-black">
                    <p>{entry.start}</p>
                    <p className="text-xs">{entry.end}</p>
                  </div>
                  <div className="p-3">
                    <div className="mb-2 flex items-start justify-between gap-2">
                      <h3 className="font-['Space_Grotesk'] text-lg font-bold leading-none">{entry.action}</h3>
                      <span className="border-2 border-black px-2 py-0.5 text-xs font-black" style={{ backgroundColor: entry.color }}>{entry.duration}</span>
                    </div>
                    <p className="text-sm font-medium">{entry.title}</p>
                    <div className="mt-3 flex justify-between border-t-2 border-black pt-2 text-xs font-black uppercase">
                      <span>{entry.active ? 'Running now' : 'Saved event'}</span>
                      <span>edit / delete</span>
                    </div>
                  </div>
                </div>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function App() {
      const [selected, setSelected] = React.useState(null);
      const [comment, setComment] = React.useState('');
      const [copied, setCopied] = React.useState(false);

      const variants = [
        { id: 1, name: 'Minimal Day Agenda', component: Variant1 },
        { id: 2, name: 'Bold Hour Grid', component: Variant2 },
        { id: 3, name: 'Glass Day Board', component: Variant3 },
        { id: 4, name: 'Editorial Ledger', component: Variant4 },
      ];

      const copyFeedback = () => {
        navigator.clipboard.writeText(JSON.stringify({ variant: selected, comment }, null, 2));
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      return (
        <div>
          <div className="grid grid-cols-1 gap-8 md:grid-cols-2">
            {variants.map(({ id, name, component: C }) => (
              <div key={id} className={`rounded-xl border-2 bg-white/[0.03] p-4 transition ${selected === id ? 'border-sky-400 ring-2 ring-sky-400/30' : 'border-white/10'}`}>
                <div className="mb-4 font-mono text-xs text-white/40">VARIANT {id} - {name}</div>
                <C />
              </div>
            ))}
          </div>

          <div className="fixed inset-x-0 bottom-0 border-t border-white/10 bg-[#080a12]/95 p-4 backdrop-blur-xl">
            <div className="mx-auto flex max-w-4xl flex-wrap items-start gap-2">
              {variants.map(({ id }) => (
                <button key={id} onClick={() => setSelected(id)}
                  className={`rounded-lg px-4 py-2 text-sm font-medium transition ${selected === id ? 'bg-sky-500 text-white' : 'bg-white/10 text-white/70 hover:bg-white/15'}`}>
                  Select Variant {id}
                </button>
              ))}
              {selected && (
                <div className="mt-2 flex w-full gap-2">
                  <textarea value={comment} onChange={e => setComment(e.target.value)}
                    placeholder="What do you like? What should change?" rows={2}
                    className="min-w-0 flex-1 resize-none rounded-lg border border-white/10 bg-black/30 px-3 py-2 text-sm text-white outline-none placeholder:text-white/35 focus:border-sky-400" />
                  <button onClick={copyFeedback}
                    className="rounded-lg bg-sky-500 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-400">
                    {copied ? 'Copied!' : 'Copy feedback'}
                  </button>
                </div>
              )}
            </div>
          </div>
          {copied && <div className="fixed bottom-32 left-1/2 -translate-x-1/2 rounded-full bg-white px-4 py-2 text-sm font-semibold text-black shadow-xl">Feedback copied!</div>}
          <div className="h-36" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
